apiVersion: apps/v1
kind: Deployment
metadata:
  name: two-tier-app-frontend-deployment-flash
  labels: 
    app: two-tier-app-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: two-tier-app-frontend
  template:
    metadata:
      labels:
        app: two-tier-app-frontend
    spec:
      containers:
        - name: two-tier-app-ctr
          image: manish857/flaskapp:latest
          env:
            - name: MYSQL_HOST
              value: "mysql"
            - name: MYSQL_USER
              value: "admin"
            - name: MYSQL_PASSWORD
              value: "admin"
            - name: MYSQL_DB
              value: "mydb"
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
